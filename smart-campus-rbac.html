<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Campus Connect — RBAC</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#080a0f;
  --s1:#0e1018;
  --s2:#141720;
  --s3:#1a1e2e;
  --border:#222638;
  --border2:#2d3250;
  --text:#dde3f8;
  --muted:#5a6190;
  --white:#ffffff;

  /* role colors */
  --super:#c084fc;
  --teacher:#38bdf8;
  --bus:#fb923c;
  --laundry:#34d399;
  --mess:#fbbf24;
  --student:#a78bfa;
}

body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}

/* ── LOGIN SCREEN ── */
#loginScreen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  position:relative;
  overflow:hidden;
}

#loginScreen::before{
  content:'';
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(192,132,252,0.06) 0%, transparent 70%);
  top:-100px;left:-100px;
  pointer-events:none;
}

#loginScreen::after{
  content:'';
  position:absolute;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(56,189,248,0.05) 0%, transparent 70%);
  bottom:-50px;right:-50px;
  pointer-events:none;
}

.login-box{
  width:420px;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px;
  position:relative;
  z-index:1;
  box-shadow:0 32px 80px rgba(0,0,0,0.5);
}

.login-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:2.2rem;
  letter-spacing:0.1em;
  color:var(--white);
  margin-bottom:4px;
}

.login-sub{font-size:0.8rem;color:var(--muted);margin-bottom:32px;}

.login-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.6rem;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:8px;
  display:block;
}

.role-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:24px;
}

.role-card{
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
  overflow:hidden;
}

.role-card::before{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:2px;
  opacity:0;
  transition:opacity 0.2s;
}

.role-card:hover{border-color:var(--border2);transform:translateY(-2px);}

.role-card.selected{border-color:currentColor;background:rgba(255,255,255,0.03);}
.role-card.selected::before{opacity:1;}

.role-card[data-role="SUPER_ADMIN"]{color:var(--super);}
.role-card[data-role="SUPER_ADMIN"]::before{background:var(--super);}
.role-card[data-role="TEACHER"]{color:var(--teacher);}
.role-card[data-role="TEACHER"]::before{background:var(--teacher);}
.role-card[data-role="BUS_ADMIN"]{color:var(--bus);}
.role-card[data-role="BUS_ADMIN"]::before{background:var(--bus);}
.role-card[data-role="LAUNDRY_ADMIN"]{color:var(--laundry);}
.role-card[data-role="LAUNDRY_ADMIN"]::before{background:var(--laundry);}
.role-card[data-role="MESS_ADMIN"]{color:var(--mess);}
.role-card[data-role="MESS_ADMIN"]::before{background:var(--mess);}
.role-card[data-role="STUDENT"]{color:var(--student);}
.role-card[data-role="STUDENT"]::before{background:var(--student);}

.role-icon{font-size:1.4rem;margin-bottom:6px;}
.role-name{font-size:0.75rem;font-weight:700;color:var(--white);}
.role-desc{font-size:0.62rem;color:var(--muted);margin-top:2px;}

.login-btn{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:none;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.88rem;
  font-weight:700;
  cursor:pointer;
  transition:all 0.2s;
  background:var(--super);
  color:#000;
  letter-spacing:0.02em;
}

.login-btn:hover{opacity:0.9;transform:translateY(-1px);}

/* ── APP SHELL ── */
#appShell{display:none;}

.topbar{
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  border-bottom:1px solid var(--border);
  background:rgba(8,10,15,0.95);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}

.topbar-left{display:flex;align-items:center;gap:16px;}

.app-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.2rem;
  letter-spacing:0.08em;
  color:var(--white);
}

.role-pill{
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px 10px;
  border-radius:20px;
  font-size:0.68rem;
  font-weight:700;
  border:1px solid currentColor;
  opacity:0.9;
}

.topbar-right{display:flex;align-items:center;gap:10px;}

.tb-btn{
  width:34px;height:34px;
  border-radius:9px;
  background:var(--s2);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:0.9rem;
  transition:all 0.15s;
  position:relative;
}
.tb-btn:hover{border-color:var(--border2);}

.tb-badge{
  position:absolute;top:-3px;right:-3px;
  width:14px;height:14px;
  background:#ef4444;
  border-radius:50%;
  font-size:0.5rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  color:white;border:2px solid var(--bg);
}

.user-chip{
  display:flex;align-items:center;gap:8px;
  padding:4px 10px 4px 4px;
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:20px;
  cursor:pointer;
}

.user-avatar{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;font-weight:800;color:#000;
}

.user-name{font-size:0.75rem;font-weight:600;color:var(--white);}

/* ── LAYOUT ── */
.app-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 56px);}

.sidebar{
  border-right:1px solid var(--border);
  padding:20px 12px;
  display:flex;flex-direction:column;gap:2px;
}

.sb-section{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.55rem;color:var(--muted);
  letter-spacing:0.14em;text-transform:uppercase;
  padding:12px 10px 5px;
}

.sb-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:9px;
  cursor:pointer;font-size:0.8rem;font-weight:500;
  color:var(--muted);transition:all 0.15s;
  border:1px solid transparent;
}

.sb-item:hover{color:var(--text);background:var(--s2);}
.sb-item.active{color:var(--white);background:var(--s2);border-color:var(--border);}
.sb-item .si{font-size:0.95rem;width:18px;text-align:center;}

.sb-badge{
  margin-left:auto;
  padding:1px 6px;border-radius:10px;
  font-size:0.58rem;font-weight:700;
  background:rgba(239,68,68,0.15);color:#f87171;
}

.content{padding:28px;overflow-y:auto;}

/* ── DASHBOARD HEADER ── */
.dash-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:24px;
}

.dash-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.8rem;letter-spacing:0.05em;
  color:var(--white);line-height:1;
}

.dash-sub{font-size:0.78rem;color:var(--muted);margin-top:4px;}

.dash-date{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.68rem;color:var(--muted);
  text-align:right;
}

/* ── STAT CARDS ── */
.stats{display:grid;gap:14px;margin-bottom:24px;}
.stats.cols4{grid-template-columns:repeat(4,1fr);}
.stats.cols3{grid-template-columns:repeat(3,1fr);}
.stats.cols2{grid-template-columns:repeat(2,1fr);}

.stat{
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
  position:relative;overflow:hidden;
}

.stat-accent{
  position:absolute;top:0;left:0;right:0;height:1.5px;
  border-radius:1px 1px 0 0;
}

.stat-emoji{font-size:1.3rem;margin-bottom:10px;}
.stat-val{
  font-family:'Bebas Neue',sans-serif;
  font-size:2rem;letter-spacing:0.03em;
  color:var(--white);line-height:1;
}
.stat-lbl{font-size:0.72rem;color:var(--muted);margin-top:4px;}

/* ── CARDS ── */
.card{
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
}

.card-header{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}

.card-title{font-size:0.85rem;font-weight:700;color:var(--white);display:flex;align-items:center;gap:7px;}

.card-body{padding:18px;}

/* ── FIRE EVENT FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-full{grid-column:1/-1;}

.fl{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.58rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.1em;
  display:block;margin-bottom:5px;
}

.fi,.fs{
  width:100%;background:var(--s1);
  border:1px solid var(--border);border-radius:8px;
  padding:8px 11px;color:var(--text);
  font-size:0.78rem;font-family:'Plus Jakarta Sans',sans-serif;
  outline:none;transition:border-color 0.2s;
}
.fi:focus,.fs:focus{border-color:var(--border2);}
.fs option{background:var(--s1);}

.fire-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 20px;border-radius:9px;border:none;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.8rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;
  color:#000;
}
.fire-btn:hover{transform:translateY(-1px);filter:brightness(1.1);}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{
  text-align:left;padding:9px 14px;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.58rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.08em;
  border-bottom:1px solid var(--border);
}
.tbl td{
  padding:11px 14px;font-size:0.78rem;
  border-bottom:1px solid var(--border);color:var(--text);
}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,0.015);}

/* ── TAGS ── */
.tag{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:5px;
  font-size:0.65rem;font-weight:600;
}
.tag.green{background:rgba(52,211,153,0.1);color:var(--laundry);}
.tag.red{background:rgba(248,113,113,0.1);color:#f87171;}
.tag.yellow{background:rgba(251,191,36,0.1);color:var(--mess);}
.tag.blue{background:rgba(56,189,248,0.1);color:var(--teacher);}
.tag.muted{background:rgba(90,97,144,0.15);color:var(--muted);}

/* ── FEED ── */
.feed-item{
  display:flex;gap:12px;align-items:flex-start;
  padding:12px 16px;border-bottom:1px solid var(--border);
  transition:background 0.1s;cursor:pointer;
  animation:slideIn 0.3s ease;
}
.feed-item:hover{background:rgba(255,255,255,0.02);}
.feed-item:last-child{border-bottom:none;}

@keyframes slideIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}

.fi-icon{
  width:34px;height:34px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;flex-shrink:0;
}

.fi-title{font-size:0.78rem;font-weight:600;color:var(--white);margin-bottom:2px;}
.fi-msg{font-size:0.7rem;color:var(--muted);line-height:1.4;}
.fi-time{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--muted);margin-top:4px;}

.live-dot{width:6px;height:6px;border-radius:50%;background:var(--laundry);box-shadow:0 0 6px var(--laundry);animation:pulse 1.5s infinite;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ── MOBILE PHONE ── */
.phone{
  width:300px;flex-shrink:0;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.phone-bar{
  background:var(--s2);
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
}

.phone-time{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;}
.phone-greet{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.05em;color:var(--white);}
.phone-sub{font-size:0.65rem;color:var(--muted);margin-top:1px;}

.phone-body{padding:12px;display:flex;flex-direction:column;gap:8px;max-height:440px;overflow-y:auto;}
.phone-notif{
  background:var(--s2);border:1px solid var(--border);
  border-radius:12px;padding:11px;
  display:flex;gap:10px;
  animation:slideIn 0.3s ease;
}
.phone-notif.fresh{border-color:rgba(167,139,250,0.4);background:rgba(167,139,250,0.05);}

.pn-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;}
.pn-title{font-size:0.73rem;font-weight:700;color:var(--white);margin-bottom:2px;}
.pn-msg{font-size:0.65rem;color:var(--muted);line-height:1.4;}
.pn-time{font-size:0.58rem;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace;}

.phone-nav{
  display:flex;background:var(--s2);
  border-top:1px solid var(--border);
  padding:8px 0 4px;
}
.pnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:0.55rem;color:var(--muted);cursor:pointer;}
.pnav-item.active{color:var(--student);}
.pnav-item .pni{font-size:1rem;}

/* ── GROUPS CARD ── */
.group-pill{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:var(--s1);border:1px solid var(--border);
  border-radius:10px;margin-bottom:8px;
  transition:border-color 0.15s;cursor:pointer;
}
.group-pill:hover{border-color:var(--border2);}
.group-pill:last-child{margin-bottom:0;}

.gp-left{display:flex;align-items:center;gap:10px;}
.gp-icon{font-size:1.1rem;}
.gp-name{font-size:0.78rem;font-weight:600;color:var(--white);}
.gp-type{font-size:0.62rem;color:var(--muted);margin-top:1px;}
.gp-count{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:999;}
.toast{
  background:var(--s2);border:1px solid var(--border);
  border-left:3px solid var(--teacher);
  border-radius:10px;padding:12px 14px;
  min-width:260px;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  display:flex;gap:9px;align-items:flex-start;
  animation:toastIn 0.25s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateX(15px);}to{opacity:1;transform:translateX(0);}}
.toast.ok{border-left-color:var(--laundry);}
.toast.warn{border-left-color:var(--mess);}
.toast.err{border-left-color:#f87171;}
.t-ico{font-size:1rem;flex-shrink:0;}
.t-title{font-size:0.78rem;font-weight:700;color:var(--white);}
.t-msg{font-size:0.68rem;color:var(--muted);margin-top:1px;}

/* ── RBAC BLOCKED ── */
.blocked{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:200px;gap:10px;
  opacity:0.5;
}
.blocked-icon{font-size:2.5rem;}
.blocked-text{font-size:0.8rem;color:var(--muted);text-align:center;}

/* ── MESS SUMMARY ── */
.meal-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.meal-row:last-child{border-bottom:none;}
.meal-name{font-size:0.8rem;font-weight:500;color:var(--white);}
.meal-check{font-size:0.75rem;}

/* scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* two/three col helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.mt{margin-top:16px;}

.section-divider{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.58rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.12em;
  margin:20px 0 12px;
  display:flex;align-items:center;gap:10px;
}
.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">SMART CAMPUS</div>
    <div class="login-sub">Role-based access control · Select your role to preview</div>

    <label class="login-label">Select Role</label>
    <div class="role-grid" id="roleGrid">
      <div class="role-card" data-role="SUPER_ADMIN" onclick="selectRole(this)">
        <div class="role-icon">🛡️</div>
        <div class="role-name">Super Admin</div>
        <div class="role-desc">Full access</div>
      </div>
      <div class="role-card" data-role="TEACHER" onclick="selectRole(this)">
        <div class="role-icon">👩‍🏫</div>
        <div class="role-name">Teacher</div>
        <div class="role-desc">Academic events</div>
      </div>
      <div class="role-card" data-role="BUS_ADMIN" onclick="selectRole(this)">
        <div class="role-icon">🚌</div>
        <div class="role-name">Bus Admin</div>
        <div class="role-desc">Transport events</div>
      </div>
      <div class="role-card" data-role="LAUNDRY_ADMIN" onclick="selectRole(this)">
        <div class="role-icon">🧺</div>
        <div class="role-name">Laundry Admin</div>
        <div class="role-desc">Laundry events</div>
      </div>
      <div class="role-card" data-role="MESS_ADMIN" onclick="selectRole(this)">
        <div class="role-icon">🍽️</div>
        <div class="role-name">Mess Admin</div>
        <div class="role-desc">Mess events</div>
      </div>
      <div class="role-card" data-role="STUDENT" onclick="selectRole(this)">
        <div class="role-icon">🎓</div>
        <div class="role-name">Student</div>
        <div class="role-desc">View only</div>
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">Continue →</button>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="appShell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="app-logo">SMART CAMPUS</div>
      <div class="role-pill" id="rolePill"></div>
    </div>
    <div class="topbar-right">
      <div class="tb-btn">🔔<div class="tb-badge" id="notifBadge">0</div></div>
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar"></div>
        <div class="user-name" id="userName"></div>
      </div>
      <div class="tb-btn" onclick="logout()" title="Logout">⏏️</div>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ── CONFIG ──
const ROLES = {
  SUPER_ADMIN:   { label:'Super Admin',   icon:'🛡️', color:'var(--super)',   name:'Arjun Mehta' },
  TEACHER:       { label:'Teacher',       icon:'👩‍🏫', color:'var(--teacher)', name:'Prof. Smith' },
  BUS_ADMIN:     { label:'Bus Admin',     icon:'🚌', color:'var(--bus)',     name:'Ravi Kumar' },
  LAUNDRY_ADMIN: { label:'Laundry Admin', icon:'🧺', color:'var(--laundry)', name:'Priya Nair' },

let currentRole = null;
let notifCount  = 0;
let feedData    = [];

// ── LOGIN ──
function selectRole(el) {
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  currentRole = el.dataset.role;
  const r = ROLES[currentRole];
  const btn = document.getElementById('loginBtn');
  btn.style.background = r.color;
  btn.textContent = `Login as ${r.label} →`;
}

function doLogin() {
  if (!currentRole) { toast('warn','Select a role','Please pick a role to continue'); return; }
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display    = 'block';
  buildShell(currentRole);
  toast('ok','Logged in', `Welcome, ${ROLES[currentRole].name}`);
}

function logout() {
  currentRole = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appShell').style.display    = 'none';
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('loginBtn').style.background = 'var(--super)';
  document.getElementById('loginBtn').textContent = 'Continue →';
  notifCount = 0; feedData = [];
}

// ── SHELL ──
function buildShell(role) {
  const r = ROLES[role];

  // topbar
  document.getElementById('rolePill').style.color   = r.color;
  document.getElementById('rolePill').innerHTML      = `${r.icon} ${r.label}`;
  document.getElementById('userAvatar').style.background = r.color;
  document.getElementById('userAvatar').textContent  = r.name.split(' ').map(w=>w[0]).join('').slice(0,2);
  document.getElementById('userName').textContent    = r.name;

  buildSidebar(role);
  buildDashboard(role);
}

}

// ── FIRE FUNCTIONS ──
function updateSATypes() {
  const domain = document.getElementById('sa-domain').value;
  const types = {
    transport: ['BUS_DELAYED','BUS_CANCELLED','BUS_ARRIVED'],
    academics: ['CLASS_CANCELLED','CLASS_RESCHEDULED','EXAM_POSTPONED'],
    laundry:   ['WASH_SLOT_BOOKED','WASH_SLOT_CANCELLED','WASH_MACHINE_STARTED','WASH_MACHINE_COMPLETED'],
    mess:      ['MESS_CHECKIN','MESS_ABSENT','MESS_REFUND_REQUESTED','MESS_REFUND_PROCESSED'],
  };
  const sel = document.getElementById('sa-type');
  sel.innerHTML = (types[domain]||[]).map(t=>`<option>${t}</option>`).join('');
}

function fireFromSA() {
  const domain   = document.getElementById('sa-domain').value;
  const type     = document.getElementById('sa-type').value;
  const entityId = document.getElementById('sa-entity').value;
  const groupId  = document.getElementById('sa-group').value;
  const reason   = document.getElementById('sa-reason').value;
  addToFeed('sa-feed', domain, type, entityId, reason);
  incStat('sa-sent'); incStat('sa-queue');
  setTimeout(()=>{ decStat('sa-queue'); },1200);
  document.getElementById('notifBadge').textContent = parseInt(document.getElementById('notifBadge').textContent)+1;
  toast('ok',`Event fired: ${type}`,`→ BullMQ · ${groupId} · ${domain}`);
  setTimeout(()=>toast('ok',`Worker processed`,`✅ Notified students in ${groupId}`),1200);
}

// ── FEED HELPER ──
function addToFeed(feedId, domain, type, entityId, detail) {
  const feed = document.getElementById(feedId);
  if (!feed) return;
  const empty = feed.querySelector('[style*="No events"]');
  if (empty) empty.remove();

  const icons = {transport:'🚌',academics:'📚',laundry:'🧺',mess:'🍽️'};
  const colors = {transport:'rgba(251,146,60,0.15)',academics:'rgba(56,189,248,0.15)',laundry:'rgba(52,211,153,0.15)',mess:'rgba(251,191,36,0.15)'};
  const accents = {transport:'var(--bus)',academics:'var(--teacher)',laundry:'var(--laundry)',mess:'var(--mess)'};

  const item = document.createElement('div');
  item.className = 'feed-item';
  item.innerHTML = `
    <div class="fi-icon" style="background:${colors[domain]}">${icons[domain]||'📡'}</div>
    <div style="flex:1">
      <div class="fi-title">${formatTitle(type)}</div>
      <div class="fi-msg">${detail||entityId}</div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:0.58rem;padding:1px 6px;border-radius:4px;background:${colors[domain]};color:${accents[domain]}">${domain}</span>
        <span class="fi-time">${new Date().toLocaleTimeString()}</span>
      </div>
    </div>`;
  feed.insertBefore(item, feed.firstChild);

  // update global feed count
  feedData.push({domain,type});
  if (document.getElementById('sa-feedcount'))
    document.getElementById('sa-feedcount').textContent = `${feedData.length} events`;
}

function formatTitle(type) {
  const m = {BUS_DELAYED:'Bus Delayed ⏱️',BUS_CANCELLED:'Bus Cancelled ❌',BUS_ARRIVED:'Bus Arrived 🚌',CLASS_CANCELLED:'Class Cancelled 📚',CLASS_RESCHEDULED:'Class Rescheduled 🗓️',EXAM_POSTPONED:'Exam Postponed 📝',WASH_MACHINE_COMPLETED:'Wash Done 🧺',WASH_SLOT_CANCELLED:'Slot Cancelled 🔄',WASH_MACHINE_STARTED:'Machine Started 🌀',WASH_SLOT_BOOKED:'Slot Booked ✅',MESS_CHECKIN:'Mess Check-in ✅',MESS_ABSENT:'Mess Absent 🍽️',MESS_REFUND_REQUESTED:'Refund Requested 💰',MESS_REFUND_PROCESSED:'Refund Processed 💸'};
  return m[type]||type;
}

// ── STAT HELPERS ──
function incStat(id) { const el=document.getElementById(id); if(el) el.textContent=parseInt(el.textContent)+1; }
function decStat(id) { const el=document.getElementById(id); if(el) el.textContent=Math.max(0,parseInt(el.textContent)-1); }

// ── TOAST ──
function toast(type, title, msg) {
  const wrap = document.getElementById('toastWrap');
  const icons = {ok:'✅',warn:'⚠️',err:'❌',info:'📡'};
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="t-ico">${icons[type]||'📡'}</div><div><div class="t-title">${title}</div><div class="t-msg">${msg}</div></div>`;
  wrap.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(15px)';el.style.transition='all 0.25s';setTimeout(()=>el.remove(),250);},3000);
}

// init
setTimeout(()=>toast('info','Smart Campus Connect','Select a role to explore the dashboard'),600);
