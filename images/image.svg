<text x="86"  y="228" font-size="8"  fill="#185FA5"  text-anchor="middle">Subscription.find()</text>
<rect x="156" y="198" width="356" height="46" rx="5" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.6"/>
<text x="334" y="214" font-size="9" fill="#0C447C" text-anchor="middle">→ studentIds[], fcmTokens[]</text>
<text x="334" y="229" font-size="9" fill="#0C447C" text-anchor="middle">Filters out null fcmToken entries</text>
