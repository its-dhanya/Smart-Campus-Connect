<text x="86"  y="344" font-size="8"  fill="#0F6E56"  text-anchor="middle">sendMulticast · update DB</text>
<rect x="156" y="314" width="356" height="46" rx="5" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.6"/>
