<text x="86"  y="286" font-size="8"  fill="#854F0B"  text-anchor="middle">Redis · BullMQ</text>
<rect x="156" y="256" width="356" height="46" rx="5" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.6"/>
<text x="334" y="272" font-size="9" fill="#633806" text-anchor="middle">queue.add('academic-event', { eventId, fcmTokens })</text>
<text x="334" y="287" font-size="9" fill="#633806" text-anchor="middle">attempts: 3 · backoff: exponential · delay: 2s</text>
