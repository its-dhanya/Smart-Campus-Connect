<text x="334" y="156" font-size="9" fill="#0C447C" text-anchor="middle">{ domain, type, groupId, metadata,</text>
<text x="334" y="171" font-size="9" fill="#0C447C" text-anchor="middle">  firedBy, deliveryStats: { total: N } }</text>
