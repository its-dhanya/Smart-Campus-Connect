<text x="125" y="402" font-size="8"  fill="#3B6D11"  text-anchor="middle">Tab closed · service worker</text>

<rect x="234" y="374" width="278" height="36" rx="5" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.6"/>
<text x="373" y="388" font-size="10" font-weight="600" fill="#173404" text-anchor="middle">In-app toast</text>
<text x="373" y="402" font-size="8"  fill="#3B6D11"  text-anchor="middle">onForegroundMessage · tab open</text>

<rect x="24" y="418" width="488" height="18" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="268" y="430" font-size="8" fill="#5F5E5A" text-anchor="middle">TTL 24 h · dismissal on Subscription.dismissedEvents (students) or Student.dismissedEvents (admins)</text>
