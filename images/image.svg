<text x="334" y="55" font-size="9" fill="#444" text-anchor="middle">  reason, newTime, newHall }</text>
<line x1="86" y1="70" x2="86" y2="82" stroke="#534AB7" stroke-width="0.6" marker-end="url(#a)"/>

<!-- ② -->
<text x="9" y="109" font-size="9" fill="#bbb" text-anchor="middle">②</text>
